version: 2
project_name: kuma
before:
  hooks:
    - go mod tidy
builds:
  - id: kuma
    main: ./cmd/kuma/
    binary: kuma
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/jinkp/kumaapi/cmd/kuma.Version={{.Version}}
      - -X github.com/jinkp/kumaapi/cmd/kuma.Commit={{.Commit}}
      - -X github.com/jinkp/kumaapi/cmd/kuma.Date={{.Date}}
archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
